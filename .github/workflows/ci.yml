name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: meeting_intel
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: meeting_intel_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    env:
      ENVIRONMENT: development
      JWT_SECRET_KEY: ci-test-secret-key-at-least-32-characters-long
      DATABASE_URL: postgresql+asyncpg://meeting_intel:testpassword@localhost:5432/meeting_intel_test
      OPENAI_API_KEY: sk-test-placeholder
      REDIS_URL: redis://localhost:6379/0
      PII_HASH_PEPPER: ci-test-pepper-at-least-32-chars-long

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check backend/

      - name: Type check (pyright/mypy — optional)
        continue-on-error: true
        run: |
          cd backend
          python -m mypy . --ignore-missing-imports --no-error-summary || true

      - name: Run tests
        run: |
          cd backend
          pytest tests/ -v --tb=short

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (validation only — no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: meeting-intel:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
